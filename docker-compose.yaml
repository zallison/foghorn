services:
  foghorn:
    image: zallison/foghorn:latest
    container_name: foghorn
    volumes:
      - ${FH_CONFIG:-./foghorn/}:/foghorn/config
    ports:
      - 53:5335    # TCP/UDP
      - 5380:5380  # Admin/API
      # - 853:1853 # DoT
      # - 443:8153 # DoH
    labels:
      - com.foghorn.priority=${FH_PRIORITY:-200}
    restart: unless-stopped
