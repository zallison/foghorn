upstreams:
  endpoints:
  - host: 8.8.8.8
    port: 53
    transport: udp
  - host: 8.8.4.4
    port: 53
    transport: tcp
    pool:
      max_connections: 32
      idle_timeout_ms: 15000
  # DoT upstream (example using a self-signed / internal CA)
  # Generate lab certs (./keys by default):
  #   make ssl-ca-pem KEYS=./keys
  #   make ssl-cert KEYS=./keys CNAME=dot.example
  #   Use the foghorn_ca.pem to verify.
  - host: 192.0.2.53
    port: 853
    transport: dot
    tls:
      server_name: dot.example
      verify: true
      ca_file: ./keys/foghorn_ca.pem
    pool:
      max_connections: 64
      idle_timeout_ms: 30000
  - transport: doh
    url: https://dns.google/dns-query
    method: POST
    headers:
      user-agent: foghorn
    tls:
      verify: true
  strategy: failover
  max_concurrent: 1
logging:
  python:
    level: info
    stderr: true
  async: true
  backends:
    - id: default-stats
      backend: sqlite
      config:
        db_path: ./config/var/stats.db
        batch_writes: true
        batch_time_sec: 15.0
        batch_max_size: 1000
plugins:
- type: docker-hosts
  config:
    endpoints:
      - url: unix:///var/run/docker.sock
        reload_interval_second: 60.0
        use_ipv4: null
        use_ipv6: null
        ttl: null
    ttl: 300
    health:
      - healthy
      - running
    discovery: false
- type: flaky_server
  config:
    targets:
      - 192.0.2.0/24
      - 2001:db8::/32
    servfail_percent: 5.0
    nxdomain_percent: 2.0
    timeout_percent: 0.0
    truncate_percent: 0.0
    formerr_percent: 0.0
    noerror_empty_percent: 0.0
    apply_to_qtypes:
      - A
      - AAAA
    fuzz_percent: 0.0
    min_fuzz_bytes: 1
    max_fuzz_bytes: 4
    wrong_qtype_percent: 0.0
    fuzz_actions:
      - bit_flip
      - swap_bytes
    seed: null
- type: file_downloader
  config:
    setup_priority: 15
    download_path: ./config/var/lists
    urls:
      - https://v.firebog.net/hosts/AdguardDNS.txt
      - https://v.firebog.net/hosts/Easylist.txt
      - https://v.firebog.net/hosts/Prigent-Ads.txt
      - https://v.firebog.net/hosts/Prigent-Malware.txt
    url_files: []
    interval_days: 1
    interval_seconds: null
    add_comment: false
    hash_filenames: false
- type: filter
  config:
    setup_priority: 20
    default: deny
    db_path: ./config/var/blocklist.db
    cache_ttl_seconds: 600
    ttl: 300
    deny_response: nxdomain
    deny_response_ip4: null
    deny_response_ip6: null
    blocked_domains:
      - tracker.example
    allowed_domains:
      - intranet.example
    blocked_patterns:
      - .*\\.ads\\..*
    blocked_patterns_files: []
    blocked_keywords:
      - gambling
    blocked_keywords_files: []
    blocked_ips:
      - ip: 198.51.100.0/24
        action: remove
      - ip: 203.0.113.5
        action: replace
        replace_with: 127.0.0.1
    blocked_ips_files: []
    blocked_domains_files:
      - ./config/var/lists/AdguardDNS-*.txt
      - ./config/var/lists/Easylist-*.txt
      - ./config/var/lists/Prigent-Ads-*.txt
      - ./config/var/lists/Prigent-Malware-*.txt
      - ./config/block.txt
    allowed_domains_files:
      - ./config/allow.txt
    clear: 1
- type: upstream
  config:
    routes:
      - domain: internal.example
        upstreams:
          - host: 10.0.0.2
            port: 53
          - host: 10.0.0.3
            port: 53
      - domain: corp
        upstreams:
          - host: 10.0.1.1
            port: 53
- type: greylist_example
  config:
    duration_seconds: 3600
    duration_hours: 24
    db_path: ./config/var/greylist.db
    cache_ttl_seconds: 300
    cache_max_entries: 100000
- type: new_domain
  config:
    threshold_days: 14
    whois_db_path: ./config/var/whois_cache.db
    whois_cache_ttl_seconds: 3600
    whois_refresh_seconds: 86400
- type: etc-hosts
  config:
    file_path: null
    file_paths:
      - /etc/hosts
    watchdog_enabled: null
    watchdog_min_interval_seconds: 1.0
    watchdog_poll_interval_seconds: 60.0   # set to 0 to disable
    ttl: 300
- type: router
  config:
    routes: []

# Inline and file-based records (ZoneRecords / `zone` plugin)
- type: zone
  id: kitchen-sink-zone
  config:
    # Optional: pipe-delimited records files
    file_path: null
    file_paths:
      - ./config/var/internal.records
    # Optional: native BIND zonefiles
    bind_paths:
      - path: ./config/var/example.com.zone
        origin: null
        ttl: null
    # Optional: inline records
    records:
      - 'example.com|SOA|300|ns1.example.com. hostmaster.example.com. 1 3600 600 604800 300'
      - 'www.example.com|A|300|192.0.2.10'

    # Optional: load/reload behaviour
    load_mode: merge     # replace | merge | first
    merge_policy: add    # add | overwrite

    # Automatic reload control
    watchdog_enabled: true
    watchdog_min_interval_seconds: 1.0
    watchdog_poll_interval_seconds: 60.0   # set to 0 to disable

    ttl: 300
    # Optional: QTYPE=ANY handling (disabled by default).
    any_query_enabled: false
    any_answer_rrset_limit: 16
    any_answer_record_limit: 64

    # Optional: Domains to return NXDOMAIN when there's no match.
    #           It will not continue to other plugins.
    nxdomain_zones:
      - .zaa

    # Optional: AXFR-backed zones fetched at startup
    axfr_zones:
      - zone: example.com
        upstreams:
          - host: 192.0.2.53
            port: 53
            timeout_ms: 5000
            transport: tcp
            server_name: null
            verify: true
            ca_file: null
        masters: null
        allow_no_dnssec: true

    # Optional: NOTIFY targets
    axfr_notify:
      - host: 192.0.2.54
        port: 53
        timeout_ms: 5000
        transport: tcp
        server_name: null
        verify: true
        ca_file: null
    axfr_notify_all: false
    axfr_notify_scheduled: 0

    # Optional: DNSSEC auto-signing
    dnssec_signing:
      enabled: false
      keys_dir: ./config/var/keys
      algorithm: ECDSAP256SHA256
      generate: maybe
      validity_days: 30
      nsec3: true
server:
  # DoS hardening knobs
  limits:
    # Shared threadpool used by asyncio listeners (TCP/DoT). Set to null to use a
    # conservative default.
    resolver_executor_workers: null

  listen:
    udp:
      enabled: true
      host: 127.0.0.1
      port: 5335

    tcp:
      enabled: false
      host: 127.0.0.1
      port: 5335
      # Connection hardening (asyncio TCP listener only)
      max_connections: 1024
      max_connections_per_ip: 64
      max_queries_per_connection: 100
      idle_timeout_seconds: 15.0

    dot:
      # DNS-over-TLS (DoT) listener (example using self-signed / internal CA certs).
      # Generate lab certs (./keys by default):
      #   make ssl-ca-pem
      #   make ssl-cert CNAME=localhost
      # Configure DoT clients to trust ./keys/foghorn_ca.pem.
      enabled: false  # set true to listen for DoT clients
      host: 127.0.0.1
      port: 8853
      cert_file: ./keys/foghorn_localhost.crt
      key_file: ./keys/foghorn_localhost.key
      # Connection hardening (asyncio DoT listener only)
      max_connections: 1024
      max_connections_per_ip: 64
      max_queries_per_connection: 100
      idle_timeout_seconds: 15.0

    doh:
      enabled: false
      host: 127.0.0.1
      port: 5380
      # When false, refuse to start the threaded stdlib DoH fallback when
      # FastAPI/uvicorn or asyncio is unavailable.
      allow_threaded_fallback: true
  cache:
    module: in_memory_ttl
    config:
      min_cache_ttl: 60
  dnssec:
    mode: ignore
    validation: upstream_ad
    udp_payload_size: 1232
  resolver:
    timeout_ms: 2000
    use_asyncio: true
  http:
    enabled: false
    host: 127.0.0.1
    port: 5380

    # Optional feature gates
    enable_api: true
    enable_schema: true
    enable_docs: true

    # When false, refuse to start the threaded stdlib admin HTTP fallback when
    # FastAPI/uvicorn or asyncio is unavailable.
    allow_threaded_fallback: true
    logs:
      buffer_size: 500
    system_info_ttl_seconds: 2.0
    system_metrics_detail: full
    debug_timings: false
    index: true
    auth:
      mode: none
    cors:
      enabled: false
      allowlist: []
    redact_keys:
    - token
    - password
    - secret
stats:
  enabled: false
  interval_seconds: 300
  reset_on_log: false
  include_qtype_breakdown: true
  include_top_clients: true
  include_top_domains: true
  top_n: 10
  track_latency: true
  force_rebuild: false
  source_backend: default-stats
  ignore:
    top_clients: []
    top_domains: []
    top_subdomains: []
    top_domains_mode: exact
    top_subdomains_mode: exact
    ignore_single_host: false
