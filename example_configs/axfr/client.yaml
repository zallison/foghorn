# secondary.yaml
server:
  # DoS hardening knobs
  limits:
    resolver_executor_workers: null

  listen:
    udp:
      enabled: true
      host: 0.0.0.0
      port: 53

    tcp:
      enabled: true
      host: 0.0.0.0
      port: 53
      # Connection hardening (asyncio TCP listener only)
      max_connections: 1024
      max_connections_per_ip: 64
      max_queries_per_connection: 100
      idle_timeout_seconds: 15.0

  # Optional: Admin HTTP UI (disabled by default)
  http:
    enabled: false
    allow_threaded_fallback: true
  dnssec:
    mode: ignore
    validation: upstream_ad
    udp_payload_size: 1232
  resolver:
    timeout_ms: 2000
    use_asyncio: true

upstreams:
  strategy: failover
  max_concurrent: 1
  endpoints:
    - host: 1.1.1.1
      port: 53
      transport: udp

logging:
  python:
    level: info

plugins:
  - type: zone
    id: axfr-secondary
    config:
      # Zones that this instance *learns* via AXFR from the primary.
      axfr_zones:
        - zone: example.com
          upstreams:
            - host: 203.0.113.10   # primary’s IP / hostname
              port: 53
              timeout_ms: 15000
        # Add more zones or primaries as needed:
        # - zone: secondary.example.net
        #   upstreams:
        #     - host: 203.0.113.11
        #       port: 53
