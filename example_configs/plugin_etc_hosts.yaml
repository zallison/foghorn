upstreams:
  endpoints:
    - host: 1.1.1.1
      port: 53
    - host: 8.8.8.8
      port: 53

logging:
  python:
    level: info

plugins:
  - type: docker-hosts
    id: docker_hosts_example
    enabled: true
    comment: 'DockerHosts example (resolve container names and reverse PTRs).'
    config:
      # BasePlugin options
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 40
      pre_priority: 40
      post_priority: 40
      setup_priority: 40
      targets:
        - 0.0.0.0/0
      targets_ignore: []
      targets_cache_ttl_seconds: 300
      targets_listener: any
      targets_domains: []
      targets_domains_mode: any
      target_qtypes:
        - '*'
      target_opcodes:
        - QUERY
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # DockerHosts-specific options
      endpoints:
        - url: unix:///var/run/docker.sock
          reload_interval_second: 60
          use_ipv4: 192.0.2.100
          use_ipv6: '2001:db8::100'
          ttl: 60
      ttl: 300
      health:
        - healthy
        - running
      discovery: true

  - type: etc-hosts
    id: etc_hosts_example
    enabled: true
    comment: 'EtcHosts example (resolve from /etc/hosts-style files).'
    config:
      # BasePlugin options
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 50
      pre_priority: 50
      post_priority: 50
      setup_priority: 50
      targets:
        - 0.0.0.0/0
      targets_ignore: []
      targets_cache_ttl_seconds: 300
      targets_listener: any
      targets_domains: []
      targets_domains_mode: any
      target_qtypes:
        - '*'
      target_opcodes:
        - QUERY
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # EtcHosts-specific options
      file_path: /etc/hosts
      file_paths:
        - /etc/hosts
        - ./config/hosts.extra
      watchdog_enabled: true
      watchdog_min_interval_seconds: 1.0
      watchdog_poll_interval_seconds: 60.0   # set to 0 to disable
      ttl: 900

server:
  listen:
    udp:
      enabled: true
      host: 127.0.0.1
      port: 5353
    tcp:
      enabled: false
    dot:
      enabled: false
  dnssec:
    mode: passthrough
    validation: upstream_ad
    udp_payload_size: 1232
