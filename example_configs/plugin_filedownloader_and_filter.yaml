upstreams:
  endpoints:
    - host: 1.1.1.1
      port: 53
    - host: 8.8.8.8
      port: 53

logging:
  python:
    level: info

plugins:
  - type: file_downloader
    id: lists_downloader
    enabled: true
    comment: 'Download block/allow lists to local files for Filter to consume.'
    config:
      # BasePlugin options
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 15
      pre_priority: 15
      post_priority: 15
      setup_priority: 15
      targets:
        - 0.0.0.0/0
      targets_ignore: []
      targets_cache_ttl_seconds: 300
      targets_listener: any
      targets_domains: []
      targets_domains_mode: any
      target_qtypes:
        - '*'
      target_opcodes:
        - QUERY
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # FileDownloader-specific options
      download_path: ./config/var/lists
      urls:
        - url: https://v.firebog.net/hosts/AdguardDNS.txt
          hash_filenames: false
          add_comment: false
        - url: https://v.firebog.net/hosts/Easylist.txt
          hash_filenames: true
          add_comment: true
        - url: https://v.firebog.net/hosts/Prigent-Ads.txt
          hash_filenames: true
          add_comment: false
        - url: https://v.firebog.net/hosts/Prigent-Malware.txt
          hash_filenames: true
          add_comment: true
      url_files:
        - ./config/url-sources/community.txt
      interval_days: 1
      interval_seconds: 86400
      add_comment: true
      hash_filenames: true

  - type: filter
    id: filter_lists
    enabled: true
    comment: 'Filter plugin consuming downloaded files + inline rules.'
    config:
      # BasePlugin options
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 20
      pre_priority: 20
      post_priority: 20
      setup_priority: 20
      targets:
        - 0.0.0.0/0
      targets_ignore: []
      targets_cache_ttl_seconds: 300
      targets_listener: any
      targets_domains: []
      targets_domains_mode: any
      target_qtypes:
        - '*'
      target_opcodes:
        - QUERY
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # Filter-specific options
      default: deny
      db_path: ./config/var/blacklist.db
      cache_ttl_seconds: 600
      ttl: 300
      deny_response: ip
      deny_response_ip4: 0.0.0.0
      deny_response_ip6: '::'

      blocked_domains_files:
        - ./config/var/lists/AdguardDNS*.txt
        - ./config/var/lists/Easylist*.txt
        - ./config/var/lists/Prigent-Ads*.txt
        - ./config/var/lists/Prigent-Malware*.txt
      allowed_domains_files:
        - ./config/allow/domains.txt

      blocked_domains:
        - tracker.example
      allowed_domains:
        - intranet.example

      blocked_patterns:
        - '.*\\.ads\\..*'
      blocked_patterns_files:
        - ./config/deny/patterns.txt

      blocked_keywords:
        - gambling
      blocked_keywords_files:
        - ./config/deny/keywords.txt

      blocked_ips:
        - ip: 198.51.100.0/24
          action: remove
        - ip: 203.0.113.5
          action: replace
          replace_with: 127.0.0.1
      blocked_ips_files:
        - ./config/deny/ips.txt

      clear: 1

server:
  listen:
    udp:
      enabled: true
      host: 127.0.0.1
      port: 5353
  dnssec:
    mode: passthrough
    validation: upstream_ad
    udp_payload_size: 1232
