upstreams:
  endpoints:
    - host: 1.1.1.1
      port: 53
    - host: 8.8.8.8
      port: 53

logging:
  python:
    level: info

plugins:
  - type: examples
    id: examples_plugin
    enabled: true
    comment: 'Examples plugin: demonstrate pre-deny + post-rewrite logic.'
    config:
      # BasePlugin options
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 55
      pre_priority: 55
      post_priority: 55
      setup_priority: 55
      targets:
        - 0.0.0.0/0
      targets_ignore: []
      targets_cache_ttl_seconds: 300
      targets_listener: any
      targets_domains: []
      targets_domains_mode: any
      target_qtypes:
        - '*'
      target_opcodes:
        - QUERY
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # Examples-specific options
      max_subdomains: 5
      max_length_no_dots: 50
      base_labels: 2
      apply_to_qtypes:
        - '*'
      rewrite_first_ipv4:
        - apply_to_qtypes:
            - A
          ip_override: 127.0.0.1
        - apply_to_qtypes:
            - AAAA
          ip_override: '::1'

server:
  listen:
    udp:
      enabled: true
      host: 127.0.0.1
      port: 5353
    tcp:
      enabled: false
    dot:
      enabled: false
  dnssec:
    mode: passthrough
    validation: upstream_ad
    udp_payload_size: 1232
