upstreams:
  endpoints:
    - host: 1.1.1.1
      port: 53
      transport: udp
  strategy: failover
  max_concurrent: 1

logging:
  python:
    level: info

plugins:
  - type: zone
    id: zone_axfr_example
    enabled: true
    comment: 'ZoneRecords example focused on AXFR-backed zones (still shows all config keys).'
    config:
      # BasePlugin options
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 60
      pre_priority: 60
      post_priority: 60
      setup_priority: 60
      targets:
        ips:
          - 0.0.0.0/0
        listeners: any
        qtypes:
          - '*'
        opcodes:
          - QUERY
      targets_cache_ttl_seconds: 300
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # ZoneRecords-specific options
      file_path: ./config/var/seed-records.txt
      file_paths:
        - ./config/var/seed-records.txt
      bind_paths:
        - path: ./config/var/example.net.zone
          origin: example.net.
          ttl: 300
      records:
        - 'seed.example.net|A|300|192.0.2.55'
      load_mode: merge
      merge_policy: add
      watchdog_enabled: true
      watchdog_min_interval_seconds: 1.0
      watchdog_poll_interval_seconds: 60.0   # set to 0 to disable
      ttl: 300
      # Optional: QTYPE=ANY handling (disabled by default).
      any_query_enabled: false
      any_answer_rrset_limit: 16
      any_answer_record_limit: 64
      nxdomain_zones:
        - example.internal

      axfr_zones:
        - zone: example.com
          allow_no_dnssec: true
          poll_interval_seconds: 300
          upstreams:
            - host: 192.0.2.10
              port: 853
              timeout_ms: 5000
              transport: dot
              server_name: ns1.example.com
              verify: true
              ca_file: ./keys/foghorn_ca.pem
        - zone: example.net.
          allow_no_dnssec: true
          upstreams:
            - host: 2001:db8::53
              port: 53
              timeout_ms: 8000
              transport: tcp
              server_name: axfr.example.net
              verify: true
              ca_file: ./keys/foghorn_ca.pem
      axfr_poll_min_interval_seconds: 60.0

      axfr_notify:
        - host: 192.0.2.53
          port: 53
          timeout_ms: 2000
          transport: tcp
          server_name: notify.example.com
          verify: true
          ca_file: ./keys/foghorn_ca.pem
      axfr_notify_allow_private_targets: false
      axfr_notify_target_allowlist:
        - 192.0.2.0/24
        - notify.example.com
      axfr_notify_min_interval_seconds: 1.0
      axfr_notify_rate_limit_per_target_per_minute: 60
      axfr_notify_scheduled: 10

      dnssec_signing:
        enabled: false
        keys_dir: ./config/var/keys
        algorithm: ECDSAP256SHA256
        generate: maybe
        validity_days: 30
        nsec3:
          salt: A1B2C3
          iterations: 10
        use_tld: corp

server:
  listen:
    udp:
      enabled: true
      host: 127.0.0.1
      port: 5353
