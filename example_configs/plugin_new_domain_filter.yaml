upstreams:
  endpoints:
    - host: 1.1.1.1
      port: 53
    - host: 8.8.8.8
      port: 53

logging:
  python:
    level: info

plugins:
  - type: new_domain
    id: new_domain_filter_example
    enabled: true
    comment: 'Example plugin that denies domains registered too recently.'
    config:
      # BasePlugin options (apply to all plugins)
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 80
      pre_priority: 80
      post_priority: 80
      setup_priority: 80
      targets:
        - 0.0.0.0/0
      targets_ignore: []
      targets_cache_ttl_seconds: 300
      targets_listener: any
      targets_domains:
        - example.com
      targets_domains_mode: suffix
      target_qtypes:
        - '*'
      target_opcodes:
        - QUERY
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # NewDomainFilterExample-specific options
      threshold_days: 14
      whois_db_path: ./config/var/whois_cache.db
      whois_cache_ttl_seconds: 3600
      whois_refresh_seconds: 86400

server:
  listen:
    udp:
      enabled: true
      host: 127.0.0.1
      port: 5353
    tcp:
      enabled: false
    dot:
      enabled: false
  dnssec:
    mode: passthrough
    validation: upstream_ad
    udp_payload_size: 1232
