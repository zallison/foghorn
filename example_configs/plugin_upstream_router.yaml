upstreams:
  endpoints:
    - host: 1.1.1.1
      port: 53
    - host: 8.8.8.8
      port: 53

logging:
  python:
    level: info

plugins:
  - type: upstream
    id: upstream_router_example
    enabled: true
    comment: 'UpstreamRouter example (route based on exact domain or suffix).'
    config:
      # BasePlugin options
      abort_on_failure: false
      enabled: true
      comment: 'Config-level comment (ignored).'
      priority: 25
      pre_priority: 25
      post_priority: 25
      setup_priority: 25
      targets:
        - 0.0.0.0/0
      targets_ignore: []
      targets_cache_ttl_seconds: 300
      targets_listener: any
      targets_domains: []
      targets_domains_mode: any
      target_qtypes:
        - '*'
      target_opcodes:
        - QUERY
      logging:
        level: info
        stderr: true
      cache:
        module: in_memory_ttl
        config:
          min_cache_ttl: 0

      # UpstreamRouter-specific options
      routes:
        - domain: internal.example
          upstreams:
            - host: 10.0.0.2
              port: 53
            - host: 10.0.0.3
              port: 53
        - suffix: corp
          upstreams:
            - host: 10.0.1.1
              port: 53

server:
  listen:
    udp:
      enabled: true
      host: 127.0.0.1
      port: 5353
    tcp:
      enabled: false
    dot:
      enabled: false
  dnssec:
    mode: passthrough
    validation: upstream_ad
    udp_payload_size: 1232
