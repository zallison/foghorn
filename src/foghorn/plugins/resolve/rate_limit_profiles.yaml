# RateLimit plugin profiles
# These profiles provide preset configuration bundles for different deployment sizes

# Static: 3 rps with a 10s, 2x burst
slow: &static_slow
  bucket_network_prefix_v4: 0
  max_enforce_rps: &slow 3
  min_enforce_rps: *slow
  bootstrap_rps:   *slow
  global_max_rps:  *slow
  burst_factor:    2 # 2x *slow
  burst_windows:   1

# Static: 15 rps with a 10s, 2x burst
medium: &static_medium
  bucket_network_prefix_v4: 0
  max_enforce_rps: &med 15
  min_enforce_rps: *med
  bootstrap_rps:   *med
  global_max_rps:  *med
  burst_factor:    2 # 2 x *med
  burst_windows:   1

# Static: 50 rps, no burst
fast: &static_fast
  bucket_network_prefix_v4: 0
  max_enforce_rps: &fast 50
  min_enforce_rps: *fast
  bootstrap_rps:   *fast
  global_max_rps:  *fast
  burst_factor:     1

## Dynamic
# Decent default for a single machine.
localhost: &localhost
  bucket_network_prefix_v4: 0
  alpha:           .2
  alpha_down:      .01
  bootstrap_rps:   30
  global_max_rps:  40
  max_enforce_rps: 20
  min_enforce_rps: 5
  burst_factor:    5.0
  burst_windows:   30 # 30s

single: *localhost

# Allow large bursts for machines coming online, software update, etc.
home: &home
  bucket_network_prefix_v4: 32 # one bucket per IP
  alpha:           .05
  alpha_down:      .10
  burst_factor:    10.0
  max_enforce_rps: 20
  bootstrap_rps:   40
  global_max_rps:  50 # If a device is at max_*_rps, we still have adequate bandwidth
  min_enforce_rps: 5
  window_seconds:  5  # Shorter window to react faster
  warmup_windows:  4  # 20s
  burst_windows:   6  # 30s

lan: *home

# If you're here, you probably know what to do.
smb: &smb
  bucket_network_prefix_v4: 24 # one bucket per /24 10.0.0.x
  alpha:            0.2
  alpha_down:       0.2
  bootstrap_rps:    150
  burst_factor:     2.0
  burst_windows:    10
  max_enforce_rps:  150
  min_enforce_rps:  50

# If you're here, you know exactly what your limit should be
enterprise: &enterprise
  bucket_network_prefix_v4: 16 # one bucket /16 10.0.x.x
  alpha:            0.2
  alpha_down:       0.2
  bootstrap_rps:    300
  burst_factor:     2.0
  burst_windows:    20
  max_enforce_rps:  400
  min_enforce_rps:  50

default: *home
