# RateLimit plugin profiles
# These profiles provide preset configuration bundles for different deployment sizes

## Static

# Static: 2 RPS per bucket, 5 rps global
slow: &slow
  max_enforce_rps: 2
  min_enforce_rps: 2
  burst_factor:    1 # None
  bootstrap_rps:   5
  global_max_rps:  5

# Static: 10 RPS / 20 rps
medium: &medium
  max_enforce_rps: 10
  min_enforce_rps: 10
  global_max_rps:  20
  burst_factor:     1
  bootstrap_rps:   10

# Static: 50 RPS / 250 rps
fast: &fast
  max_enforce_rps: 50
  min_enforce_rps: 50
  global_max_rps: 250
  burst_factor:     1
  bootstrap_rps:   50

## Dynamic
# Decent default for a single machine.
localhost: &localhost
  alpha:           .2
  alpha_down:      .01
  window_seconds:   1
  burst_factor:    5.0
  burst_windows:   30 # 30s
  bootstrap_rps:   15
  max_enforce_rps: 15
  min_enforce_rps: 2
  bucket_network_prefix_v4: 32 # x.x.x.x/32

single: *localhost

# Allow large bursts for machines coming online, software update, etc.
home: &home
  alpha:           .10
  alpha_down:      .10
  bootstrap_rps:   40
  burst_factor:    10.0
  burst_windows:   6  # 30s
  max_enforce_rps: 30
  global_max_rps:  50
  min_enforce_rps: 2
  window_seconds:  5  # Shorter window to react faster
  warmup_windows:  2
  bucket_network_prefix_v4: 32 # x.x.x.x/32

lan: *home

# If you're here, you probably know what to do.
smb: &smb
  alpha:             0.01
  alpha_down:        0.02
  bootstrap_rps:   150
  burst_factor:      2.0
  burst_windows:     6
  max_enforce_rps:  150
  min_enforce_rps:  15
  bucket_network_prefix_v4: 24 # x.x.x.x/24

# If you're here, you know exactly what your limit should be
enterprise: &enterprise
  alpha:            0.05
  alpha_down:       0.1
  min_enforce_rps: 10
  max_enforce_rps: 50
  bootstrap_rps:   50
  burst_factor:     2.0
  burst_windows:    3
  bucket_network_prefix_v4: 16 # x.x.x.x/24

default: *home
